---
### Garage ###

automation:
  ################################################################################
  # Turn on the lights if the garage door is opened
  - id: area_garage_motion
    alias: 'Area - Garage - Motion'
    trigger:
      - platform: state
        entity_id:
          - cover.main_garage_door
          - cover.second_garage_door
        from: 'closed'
        to:
          - 'open'
          - 'opening'
      - platform: state
        entity_id:
          - binary_sensor.garage_door
          - binary_sensor.garage_side_door
          - binary_sensor.garage_occupancy
          - binary_sensor.garage_motion
          - binary_sensor.garage_camera_motion
        from: 'off'
        to: 'on'
      - platform: event
        event_type: call_service
        event_data:
          domain: cover
          service: open_cover
          service_data:
            entity_id:
              - cover.main_garage_door
              - cover.second_garage_door
    condition:
      - condition: state
        entity_id: switch.garage_lights
        state: 'off'
    action:
      - service: switch.turn_on
        data:
          entity_id: switch.garage_lights
  ################################################################################
  # Turn the lights off if there's been no motion for 5 minutes
  - id: area_garage_motion_cleared
    alias: 'Area - Garage - Motion Cleared'
    trigger:
      - platform: state
        entity_id:
          - binary_sensor.garage_motion
          - binary_sensor.garage_camera_motion
          - binary_sensor.garage_occupancy
        from: 'on'
        to: 'off'
        for:
          minutes: 5
    condition:
      # By ensuring all of these conditions are met, the garage lights will only
      # turn off if all when the garage is empty and the doors are closed
      - condition: and
        conditions:
          - condition: state
            entity_id: binary_sensor.garage_door
            state: 'off'
          - condition: state
            entity_id: binary_sensor.garage_side_door
            state: 'off'
          - condition: state
            entity_id: binary_sensor.garage_occupancy
            state: 'off'
          - condition: state
            entity_id: cover.main_garage_door
            state: 'closed'
          - condition: state
            entity_id: cover.second_garage_door
            state: 'closed'
          - condition: state
            entity_id: switch.garage_lights
            state: 'on'
    action:
      - service: switch.turn_off
        data:
          entity_id: switch.garage_lights
  ################################################################################
  - id: area_garage_main_door_nfc
    alias: 'Area - Garage - Main Door NFC'
    trigger:
      platform: event
      event_type: tag_scanned
      event_data:
        tag_id: !secret nfc_main_garage_door
    action:
      - alias: 'State handler'
        choose:
          - conditions:
              - alias: 'Main Garage Door Open'
                condition: state
                entity_id: cover.main_garage_door
                state: 'open'
            sequence:
              - alias: 'Close Main Garage Door'
                service: cover.close_cover
                target:
                  entity_id: cover.main_garage_door
          - conditions:
              - alias: 'Main Garage Door Closed'
                condition: state
                entity_id: cover.main_garage_door
                state: 'closed'
            sequence:
              - alias: 'Open Main Garage Door'
                service: cover.open_cover
                target:
                  entity_id: cover.main_garage_door
  ################################################################################
  - id: area_garage_second_door_nfc
    alias: 'Area - Garage - Second Door NFC'
    trigger:
      platform: event
      event_type: tag_scanned
      event_data:
        tag_id: !secret nfc_second_garage_door
    action:
      - alias: 'State handler'
        choose:
          - conditions:
              - alias: 'Second Garage Door Open'
                condition: state
                entity_id: cover.second_garage_door
                state: 'open'
            sequence:
              - alias: 'Close Second Garage Door'
                service: cover.close_cover
                target:
                  entity_id: cover.second_garage_door
          - conditions:
              - alias: 'Second Garage Door Closed'
                condition: state
                entity_id: cover.second_garage_door
                state: 'closed'
            sequence:
              - alias: 'Open Second Garage Door'
                service: cover.open_cover
                target:
                  entity_id: cover.second_garage_door
  ################################################################################
  - id: area_garage_door_left_open_actionable_alert
    alias: 'Area - Garage - Door Left Open Actionable Alert'
    description: Send actionable alert when a garage door is left open
    trigger:
      - platform: state
        entity_id:
          - cover.main_garage_door
          - cover.second_garage_door
        to: 'open'
        for:
          minutes: 10
    condition:
      - condition: state
        entity_id: binary_sensor.garage_motion
        state: 'off'
        for:
          minutes: 5
      - condition: state
        entity_id: binary_sensor.garage_camera_motion
        state: 'off'
        for:
          minutes: 5
      - condition: state
        entity_id: binary_sensor.garage_occupancy
        state: 'off'
        for:
          minutes: 5
    variables:
      door_name: >
        {% if trigger.entity_id == 'cover.main_garage_door' %}
          Main garage door
        {% else %}
          Second garage door
        {% endif %}
      door_tag: >
        {% if trigger.entity_id == 'cover.main_garage_door' %}
          garage-main-door-open
        {% else %}
          garage-second-door-open
        {% endif %}
      action_close: "{{ 'CLOSE_GARAGE_DOOR_' ~ context.id }}"
      action_ignore: "{{ 'IGNORE_GARAGE_DOOR_' ~ context.id }}"
    action:
      - service: notify.mobile_app_ians_iphone
        data:
          title: Garage Alert
          message: '{{ door_name }} has been open for 10 minutes.'
          data:
            tag: '{{ door_tag }}'
            group: garage-doors
            push:
              interruption-level: time-sensitive
            actions:
              - action: '{{ action_close }}'
                title: Close Door
                destructive: true
              - action: '{{ action_ignore }}'
                title: Ignore
      - service: notify.mobile_app_ians_ipad_pro
        data:
          title: Garage Alert
          message: '{{ door_name }} has been open for 10 minutes.'
          data:
            tag: '{{ door_tag }}'
            group: garage-doors
            push:
              interruption-level: time-sensitive
            actions:
              - action: '{{ action_close }}'
                title: Close Door
                destructive: true
              - action: '{{ action_ignore }}'
                title: Ignore
      - wait_for_trigger:
          - platform: event
            event_type: mobile_app_notification_action
            event_data:
              action: '{{ action_close }}'
          - platform: event
            event_type: mobile_app_notification_action
            event_data:
              action: '{{ action_ignore }}'
        timeout:
          minutes: 30
      - choose:
          - conditions:
              - condition: template
                value_template: '{{ wait.trigger is not none and wait.trigger.event.data.action == action_close }}'
              - condition: template
                value_template: "{{ is_state(trigger.entity_id, 'open') }}"
            sequence:
              - service: cover.close_cover
                target:
                  entity_id: '{{ trigger.entity_id }}'
          - conditions:
              - condition: template
                value_template: '{{ wait.trigger is not none and wait.trigger.event.data.action == action_ignore }}'
            sequence:
              - stop: User chose to ignore the garage door alert.
################################################################################
