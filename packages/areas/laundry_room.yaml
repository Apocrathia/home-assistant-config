---
### Laundry Room ###

input_number:
  ################################################################################
  washing_machine_energy_threshold:
    name: 'Washing Machine Energy Threshold'
    icon: mdi:lightning-bolt
    min: 0
    max: 100
    step: 5
    unit_of_measurement: Watts
################################################################################

input_boolean:
  ################################################################################
  laundry_washing_machine_complete_alert:
    name: Laundry Washing Machine Complete Alert
    icon: mdi:washing-machine-alert
  laundry_dryer_complete_alert:
    name: Laundry Dryer Complete Alert
    icon: mdi:tumble-dryer-alert
################################################################################

template:
  ################################################################################
  - binary_sensor:
      - default_entity_id: binary_sensor.washing_machine_status
        name: Washing Machine Status
        state: >
          {{ ( float(states.input_number.washing_machine_energy_threshold.state)
            < float(states.sensor.washing_machine_outlet_power.state) ) }}
        delay_off:
          minutes: 5
################################################################################

alert:
  ################################################################################
  laundry_washing_machine_complete:
    name: Laundry Washing Machine Complete
    message: The washing machine has finished its cycle! 🧺
    done_message: clear_notification
    entity_id: input_boolean.laundry_washing_machine_complete_alert
    state: 'on'
    repeat:
      - 15
      - 30
      - 60
    can_acknowledge: true
    skip_first: false
    notifiers:
      - mobile_app_ians_iphone
      - mobile_app_ians_ipad_pro
    data:
      tag: laundry-washer-complete
      group: laundry-appliances
      push:
        interruption-level: active

  laundry_dryer_complete:
    name: Laundry Dryer Complete
    message: The dryer has finished its cycle! 👕
    done_message: clear_notification
    entity_id: input_boolean.laundry_dryer_complete_alert
    state: 'on'
    repeat:
      - 15
      - 30
      - 60
    can_acknowledge: true
    skip_first: false
    notifiers:
      - mobile_app_ians_iphone
      - mobile_app_ians_ipad_pro
    data:
      tag: laundry-dryer-complete
      group: laundry-appliances
      push:
        interruption-level: active
################################################################################

automation:
  ################################################################################
  - id: area_laundry_washing_machine_complete_alert_set
    alias: 'Area - Laundry Room - Washing Machine Complete Alert Set'
    trigger:
      - platform: state
        entity_id: binary_sensor.washing_machine_status
        from: 'on'
        to: 'off'
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.laundry_washing_machine_complete_alert

  - id: area_laundry_washing_machine_complete_alert_reset
    alias: 'Area - Laundry Room - Washing Machine Complete Alert Reset'
    trigger:
      - platform: state
        entity_id: binary_sensor.washing_machine_status
        from: 'off'
        to: 'on'
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.laundry_washing_machine_complete_alert

  - id: area_laundry_dryer_complete_alert_set
    alias: 'Area - Laundry Room - Dryer Complete Alert Set'
    trigger:
      - platform: state
        entity_id: binary_sensor.dryer_vibration_sensor_vibration
        from: 'on'
        to: 'off'
        for:
          minutes: 2
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.laundry_dryer_complete_alert

  - id: area_laundry_dryer_complete_alert_reset
    alias: 'Area - Laundry Room - Dryer Complete Alert Reset'
    trigger:
      - platform: state
        entity_id: binary_sensor.dryer_vibration_sensor_vibration
        from: 'off'
        to: 'on'
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.laundry_dryer_complete_alert
################################################################################
